name: Deploy demo to GitHub Pages

# Builds the static, server-less demo (in-browser mock hub) and publishes it to GitHub Pages.
# Enable once under: repo Settings → Pages → Build and deployment → Source = "GitHub Actions".

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# One deploy at a time; a newer push supersedes an in-flight one.
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
      - name: Install (runtime deps only)
        run: npm ci --omit=dev
      - name: Bake loops + icons
        run: npm run bake
      - name: Build demo site
        run: npm run build:demo
      - uses: actions/configure-pages@v5
        with:
          enablement: true   # auto-enable Pages (build source = GitHub Actions) on first run; needs pages: write
      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
