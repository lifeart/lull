# Split-horizon DNS: make the public hostname resolve to the hub's LAN IP so the trusted
# public cert is used entirely offline on the LAN, surviving DHCP IP churn on old devices.
# Point the phones' DNS at this box (or set the same override on your router).
#
# Replace hub.home.example.com + 192.168.1.50 with your domain + the hub's static LAN IP.

address=/hub.home.example.com/192.168.1.50

# If you use per-room subdomains, add them too:
# address=/nursery.hub.home.example.com/192.168.1.50
