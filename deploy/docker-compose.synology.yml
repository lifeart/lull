# Hub-only compose for a Synology NAS (Container Manager) — NO bundled Caddy.
# Paths for the required secure context (see docs/DEPLOY-SYNOLOGY.md for the full trade-offs):
#   • Plain HTTP on the LAN (simplest)         → the "always-audible, hardware-set-volume" model
#   • DSM Reverse Proxy + Let's Encrypt        → LAN-local TLS, full features, survives WAN outage
#   • Cloudflare Tunnel (cloudflared below)    → trusted TLS, no port-forward, iOS 12–14, remote access
#
# TWO WAYS TO GET THE IMAGE:
#   A) Pre-build off-NAS with Podman (recommended — no repo/toolchain on the NAS):
#        ./deploy/podman-build.sh              # → deploy/lull-hub.tar (arch: linux/amd64)
#        # copy it over, then:  docker load -i lull-hub.tar
#      The script strips Podman's `localhost/` prefix, so the loaded image is a clean
#      `lull-hub:latest` that the `image:` line below matches exactly. This is the default.
#   B) Build on the NAS: put the repo on the NAS, comment out `image:` and uncomment `build:`.
# Then: Container Manager → Project → Create → upload this file.

services:
  hub:
    image: lull-hub:latest   # produced by deploy/podman-build.sh (localhost/ prefix stripped)
    # build:                 # ← use instead of image: to build on the NAS (needs the repo present)
    #   context: ..
    #   dockerfile: deploy/Dockerfile
    container_name: lull-hub
    ports:
      - "8080:8080" # host:container — reach the hub at http://<nas-ip>:8080 (or proxy 443 → here)
    environment:
      - PORT=8080
      - STATE_FILE=/data/state.json
      - UPLOADS_DIR=/data/uploads
      # REQUIRED shared secret (control channel). Generate: openssl rand -hex 24
      # For a trusted home LAN you may instead set MP_ALLOW_OPEN=1 and omit the token.
      - MP_TOKEN=${MP_TOKEN:-}
      - MP_ALLOW_OPEN=${MP_ALLOW_OPEN:-}
      # Origin allowlist. Usually NOT needed: the hub already accepts same-origin requests (Origin
      # host == the Host you connect to), so http://<nas-ip>:8080 and a Host-preserving reverse proxy
      # work out of the box. Set this only if a proxy REWRITES the Host header, e.g.:
      #   MP_ORIGIN=https://mynas.synology.me
      - MP_ORIGIN=${MP_ORIGIN:-}
    volumes:
      # Bind-mount a Synology shared folder. The container fixes ownership on boot (runs its
      # entrypoint as root, chowns /data, then drops to the unprivileged `node` user), so Synology's
      # volume ownership doesn't matter. Create the folder first (e.g. /docker/lull).
      - /volume1/docker/lull/data:/data
    restart: unless-stopped

  # --- OPTIONAL: Cloudflare Tunnel for trusted TLS with no port-forwarding (Option C in the guide) ---
  # 1. Zero Trust dashboard → Networks → Tunnels → Create tunnel → Docker → copy the token.
  # 2. Put it in your .env as CF_TUNNEL_TOKEN and uncomment this service.
  # 3. In the tunnel's Public Hostname page, point your hostname → http://hub:8080 (this Docker network).
  # 4. Set MP_ORIGIN=https://<your-tunnel-hostname> on the hub above, and keep MP_TOKEN set.
  # With a pure tunnel you can also remove the hub's `ports:` mapping — nothing needs to be exposed.
  # cloudflared:
  #   image: cloudflare/cloudflared:latest
  #   container_name: lull-cloudflared
  #   command: tunnel --no-autoupdate run
  #   environment:
  #     - TUNNEL_TOKEN=${CF_TUNNEL_TOKEN}
  #   depends_on: [hub]
  #   restart: unless-stopped
