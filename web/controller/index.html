<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Controller" />
  <meta name="theme-color" content="#f2f2f7" media="(prefers-color-scheme: light)" />
  <meta name="theme-color" content="#000000" media="(prefers-color-scheme: dark)" />
  <link rel="manifest" href="manifest.webmanifest" />
  <link rel="apple-touch-icon" href="/icon-180.png" />
  <link rel="icon" href="/icon-180.png" />
  <link rel="stylesheet" href="/app.css" />
  <title>mesh-playback · Controller</title>
</head>
<body>
  <div id="alarmBanner" class="banner alarm" role="alert" aria-live="assertive" hidden>
    <span id="alarmText"></span>
    <button id="alarmDismiss" class="btn btn-ghost" style="min-height:44px">Dismiss</button>
  </div>

  <div class="appbar">
    <h1>Rooms</h1>
    <span id="hubStatus" class="hub">…</span>
  </div>

  <main class="wrap">
    <div class="card">
      <button id="preflightBtn" class="btn btn-primary block">🌙 Check all rooms</button>
      <p id="preflightResult" class="muted" aria-live="polite" style="margin:12px 0 0; text-align:center; min-height:1.2em"></p>
    </div>

    <div class="card" id="soundsCard">
      <div class="row">
        <h2>Sounds</h2>
        <span class="spacer"></span>
        <button id="addSoundBtn" class="btn btn-ghost" style="min-height:44px; padding:0 14px">＋ Add sound</button>
      </div>
      <p class="faint" style="margin:6px 0 0">White / pink / brown are built in. Drop a file here, or tap “Add sound”, to add your own (lullaby, recording) — under 30 MB.</p>
      <div id="uploadList" class="sec"></div>
      <p id="uploadStatus" class="muted" aria-live="polite" style="margin:8px 0 0" hidden></p>
      <input id="fileInput" type="file" accept="audio/*" hidden />
    </div>

    <p id="empty" class="muted" hidden style="margin-top:16px">
      No devices yet. Open the Speaker page on an old iPhone/iPad and tap “Arm this device”.
    </p>
    <div id="devices" class="stack" style="margin-top:12px"></div>
  </main>

  <script type="module" src="controller.js"></script>
</body>
</html>
